<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>依頼番号送信</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  font-size:1rem;
}

input{
  width:90%;
  font-size:1.2rem;
  padding:10px;
}

button{
  width:100%;
  height:60px;
  font-size:1.2rem;
  background:#06c755;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>
<div class="box">
  <iframe 
    src="https://www.google.com/maps/d/embed?mid=1X9DuXCIVS_AU8hzWkiHASE5pgG21AI8&ehbc=2E312F"
    width="100%"
 
    style="border:0;">
  </iframe>
</div>
<div class="box">
マイマップで受諾する依頼を確認し、依頼番号の数字部分だけ入力してください。
</div>

<div class="box">
<input id="reqNo" placeholder="例: 123">
</div>

<button onclick="send()">送信</button>

<script>

const LIFF_ID = "2009813883-gmkbaGSW"

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID })
  }catch(e){
    console.log("LIFF outside")
  }
}
init()

function normalizeNumber(str){
  return str.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  )
}

async function send(){

  let input = document.getElementById("reqNo").value.trim()

  if(!input){
    alert("依頼番号を入力してください")
    return
  }

  input = normalizeNumber(input)

  // 「依頼No.123」でもOKにする
  const match = input.match(/(\d+)/)

  if(!match){
    alert("数字を含めて入力してください")
    return
  }

  const no = match[1]

  if(!liff.isInClient()){
    alert("LINE内から開いてください")
    return
  }

  try{
    await liff.sendMessages([
      {
        type:"text",
        text:`依頼No.${no}`
      }
    ])

    liff.closeWindow()

  }catch(e){
    alert("送信失敗")
    console.error(e)
  }
}

</script>

</body>
</html>
