<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>依頼番号送信</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 全体を縦レイアウト */
.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 上部説明 */
.header{
  background:white;
  padding:10px;
  font-size:0.9rem;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* マップ：残り全部使う */
.map{
  flex:1;
}

.map iframe{
  width:100%;
  height:100%;
  border:0;
}

/* 下部操作 */
.footer{
  background:white;
  padding:10px;
  box-shadow:0 -2px 5px rgba(0,0,0,0.2);
}

input{
  width:100%;
  font-size:1.2rem;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  height:55px;
  font-size:1.2rem;
  background:#06c755;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 説明 -->
  <div class="header">
    マップから依頼番号を確認し、数字のみ入力してください
  </div>

  <!-- マップ -->
  <div class="map">
    <iframe 
      src="https://www.google.com/maps/d/embed?mid=1X9DuXCIVS_AU8hzWkiHASE5pgG21AI8&ehbc=2E312F">
    </iframe>
  </div>

  <!-- 入力 -->
  <div class="footer">
    <input id="reqNo" placeholder="例: 123">
    <button onclick="send()">送信</button>
  </div>

</div>

<script>

const LIFF_ID = "2009813883-gmkbaGSW"

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID })
  }catch(e){
    console.log("LIFF outside")
  }
}
init()

function normalizeNumber(str){
  return str.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  )
}

async function send(){

  let input = document.getElementById("reqNo").value.trim()

  if(!input){
    alert("依頼番号を入力してください")
    return
  }

  input = normalizeNumber(input)

  const match = input.match(/(\d+)/)

  if(!match){
    alert("数字のみ入力してください")
    return
  }

  const no = match[1]

  if(!liff.isInClient()){
    alert("LINE内から開いてください")
    return
  }

  try{
    await liff.sendMessages([
      {
        type:"text",
        text:`依頼No.${no}`
      }
    ])

    liff.closeWindow()

  }catch(e){
    alert("送信失敗")
    console.error(e)
  }
}

</script>

</body>
</html>
