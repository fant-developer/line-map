<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>依頼番号送信</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background:#f5f5f5;
  overflow-x:hidden;
}

/* 上説明 */
.header{
  padding:10px;
  background:white;
  font-size:0.9rem;
}

/* マップ */
.mapWrap{
  position:relative;
  height:calc(100vh - 60px);
}

.mapWrap iframe{
  width:100%;
  height:100%;
  border:0;
}

/* フロートUI */
.floating{
  position:absolute;
  left:10px;
  right:10px;
  bottom:20px;
  background:white;
  padding:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* 入力 */
input{
  width:100%;
  font-size:1.2rem;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
}

/* ボタン */
button{
  width:100%;
  height:55px;
  font-size:1.2rem;
  background:#06c755;
  color:white;
  border:none;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="header" id="topAnchor">
  マップで依頼番号を確認し、数字のみ入力してください
</div>

<div class="mapWrap">

  <iframe src="https://www.google.com/maps/d/embed?mid=1X9DuXCIVS_AU8hzWkiHASE5pgG21AI8&ehbc=2E312F"></iframe>

  <div class="floating" id="floatingBox">
    <input id="reqNo" placeholder="例: 123">
    <button onclick="send()">送信</button>
  </div>

</div>

<script>

const LIFF_ID = "2009813883-gmkbaGSW"

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID })
  }catch(e){
    console.log("LIFF outside")
  }
}
init()

function normalizeNumber(str){
  return str.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  )
}

async function send(){

  let input = document.getElementById("reqNo").value.trim()

  if(!input){
    alert("依頼番号を入力してください")
    return
  }

  input = normalizeNumber(input)

  const match = input.match(/(\d+)/)

  if(!match){
    alert("数字のみ入力してください")
    return
  }

  const no = match[1]

  if(!liff.isInClient()){
    alert("LINE内から開いてください")
    return
  }

  try{
    await liff.sendMessages([
      {
        type:"text",
        text:`依頼No.${no}`
      }
    ])

    liff.closeWindow()

  }catch(e){
    alert("送信失敗")
  }
}

//
// ▼ フロート位置補正（キーボード）
//

function adjustFloating(){
  if(window.visualViewport){
    const vv = window.visualViewport
    const box = document.getElementById("floatingBox")

    function update(){
      const keyboardHeight = window.innerHeight - vv.height
      box.style.bottom = (20 + keyboardHeight) + "px"
    }

    vv.addEventListener("resize", update)
    vv.addEventListener("scroll", update)
  }
}

adjustFloating()

//
// ▼ 上部へ強制スクロール（ここ追加）
//

const inputEl = document.getElementById("reqNo")

inputEl.addEventListener("focus", () => {

  // iOS対策：少し遅らせる
  setTimeout(() => {

    // 最上部へ
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    })

  }, 300)

})

</script>

</body>
</html>
