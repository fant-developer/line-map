<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>依頼番号送信</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 共通ボックス */
.box{
  background:white;
  padding:12px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* マップ */
.map{
  height:60vh;
  margin:10px;
}

.map iframe{
  width:100%;
  height:100%;
  border:0;
  border-radius:10px;
}

/* 入力 */
input{
  width:100%;
  font-size:1.2rem;
  padding:10px;
  box-sizing:border-box;
}

/* ボタン */
button{
  width:100%;
  height:60px;
  font-size:1.2rem;
  background:#06c755;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- ①説明（スクロール基準） -->
<div id="topAnchor" class="box">
  マップで依頼番号を確認 → 数字のみ入力 → 送信
</div>

<!-- ②マップ -->
<div class="map">
  <iframe src="https://www.google.com/maps/d/embed?mid=1X9DuXCIVS_AU8hzWkiHASE5pgG21AI8&ehbc=2E312F"></iframe>
</div>

<!-- ③入力 -->
<div class="box">
  <input id="reqNo" placeholder="例: 123">
</div>

<!-- ④送信 -->
<div class="box">
  <button onclick="send()">送信</button>
</div>

<script>

const LIFF_ID = "2009813883-gmkbaGSW"

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID })
  }catch(e){
    console.log("LIFF outside")
  }
}
init()

function normalizeNumber(str){
  return str.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  )
}

async function send(){

  let input = document.getElementById("reqNo").value.trim()

  if(!input){
    alert("依頼番号を入力してください")
    return
  }

  input = normalizeNumber(input)

  const match = input.match(/(\d+)/)

  if(!match){
    alert("数字のみ入力してください")
    return
  }

  const no = match[1]

  if(!liff.isInClient()){
    alert("LINE内から開いてください")
    return
  }

  try{
    await liff.sendMessages([
      {
        type:"text",
        text:`依頼No.${no}`
      }
    ])

    liff.closeWindow()

  }catch(e){
    alert("送信失敗")
  }
}

//
// ▼ ここが今回のキモ（スクロール制御）
//

const inputEl = document.getElementById("reqNo")
const anchor = document.getElementById("topAnchor")

inputEl.addEventListener("focus", () => {
  setTimeout(() => {
    window.scrollTo({
      top: anchor.offsetTop,
      behavior: "smooth"
    })
  }, 300)
})

inputEl.addEventListener("blur", () => {
  setTimeout(() => {
    window.scrollTo({ top: 0, behavior: "smooth" })
  }, 100)
})

</script>

</body>
</html>
