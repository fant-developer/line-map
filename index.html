<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>駆除依頼場所の選択</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:sans-serif;
background:#f5f5f5;
}

#map{
width:100%;
height:75vh;
}

#panel{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:10;
}

.box{
background:white;
padding:10px;
margin-bottom:8px;
border-radius:8px;
font-size:2vw;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#sendBtn{
width:100%;
height:12vh;
font-size:2vw;
background:#06c755;
color:white;
border:none;
}

#sendBtn:disabled{
background:#999;
}

#confirmBtn{
width:100%;
height:8vh;
font-size:2vw;
background:#2196f3;
color:white;
border:none;
}

#confirmBtn:disabled{
background:#999;
}

</style>

</head>

<body>

<div id="panel">

<div id="info" class="box">
地図をタップして場所を指定してください
</div>

<div id="address" class="box">
住所未選択
</div>

<button id="confirmBtn" disabled>
この場所で確定
</button>

</div>

<div id="map"></div>

<button id="sendBtn" disabled>
駆除依頼場所の送信
</button>

<script>

const LIFF_ID = "2009188516-g4iIlaf8"
const GOOGLE_API_KEY = "AIzaSyAwkQccxU8_KuOh_fDkv9V-vEbfONHWeMI"

let map
let marker
let selectedLatLng = null
let selectedAddress = ""

async function initLiff(){

try{
await liff.init({ liffId: LIFF_ID })
}catch(e){
console.log("LIFF outside")
}

}

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{
center:{ lat:43.06888563336119 , lng:141.35077686001165 },
zoom:14,
gestureHandling:"greedy"
})

map.addListener("click",async (e)=>{

selectedLatLng = e.latLng

if(marker) marker.setMap(null)

marker = new google.maps.Marker({
position:selectedLatLng,
map:map
})

document.getElementById("info").innerText="住所取得中..."
document.getElementById("confirmBtn").disabled=false

const lat = selectedLatLng.lat()
const lng = selectedLatLng.lng()

const address = await reverseGeocode(lat,lng)

selectedAddress = address

document.getElementById("address").innerText=address
document.getElementById("info").innerText="場所を確認して確定してください"

})

}

async function reverseGeocode(lat,lng){

try{

const url =
`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GOOGLE_API_KEY}`

const res = await fetch(url)
const data = await res.json()

if(data.status!=="OK"){
console.log(data)
return "住所取得失敗"
}

return data.results[0].formatted_address

}catch(e){

console.log(e)
return "住所取得失敗"

}

}

document.getElementById("confirmBtn").addEventListener("click",()=>{

document.getElementById("info").innerText="この場所で送信できます"
document.getElementById("sendBtn").disabled=false

})

document.getElementById("sendBtn").addEventListener("click",async ()=>{

if(!selectedLatLng) return

const lat = selectedLatLng.lat()
const lng = selectedLatLng.lng()

const message =
`住所: ${selectedAddress}
緯度: ${lat}
経度: ${lng}`

if(typeof liff!=="undefined" && liff.isInClient()){

await liff.sendMessages([
{
type:"text",
text:`住所: ${selectedAddress}\n緯度: ${lat}\n経度: ${lng}`
},
{
type:"text",
text:"駆除依頼登録お願いします"
}
])

liff.closeWindow()

}else{

alert(message)

}

})

initLiff()

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAwkQccxU8_KuOh_fDkv9V-vEbfONHWeMI&callback=initMap">
</script>

</body>
</html>
